version: '3.8'

services:
# container 1: the official POSTGRESQL databse
  db:
    image: postgres:15
    env_file:
      - .env 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# Container 2: FastAPI application
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

# Declare the volume at the very bottom
volumes:
  postgres_data: