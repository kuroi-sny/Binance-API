version: '3.8'

services:
# container 1: the official POSTGRESQL databse
  db:
    image: postgres:15
    env_file:
      - .env 
    ports:
     - "5432:5432"


# Container 2: FastAPI application
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
